services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: znshop_backend
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      - PORT=8000
      - PYTHONPATH=/app/backend
    command: sh -c "uvicorn backend.app.main:app --host 0.0.0.0 --port ${PORT}"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    volumes:
      - ./logs:/app/logs

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: znshop_worker
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - backend/.env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs:/app/logs

  beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: znshop_beat
    command: celery -A app.workers.celery_app beat --loglevel=info
    env_file:
      - backend/.env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: znshop_dashboard
    command: streamlit run /app/dashboard/admin_dashboard.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - backend/.env
    environment:
      - ZNSHOP_API_URL=http://backend:8000/api/v1
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: znshop_redis
    # No host port binding — services connect via Docker network hostname `redis`.
    # To access Redis from your HOST machine (e.g. redis-cli), uncomment the lines below:
    # ports:
    #   - "6380:6379"   # mapped to 6380 to avoid conflict with local Redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
