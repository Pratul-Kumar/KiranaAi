{% extends "base.html" %}
{% block title %}Login — ZnShop Admin{% endblock %}
{% block nav %}{% endblock %}
{% block body %}
<div class="login-wrap">
  <div class="card login-card">
    <h1>🏪 ZnShop</h1>
    <p class="subtitle">Admin Dashboard</p>

    {% if error %}
    <div class="flash flash-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/admin/login">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="admin@znshop.local" required autofocus />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="••••••••" required />
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:.5rem" type="submit">
        Login →
      </button>
    </form>
  </div>
</div>
{% endblock %}
